; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]

; Using a specific version of the platform ensures build stability over time
platform = espressif32@6.6.0
board = esp32-s3-devkitc-1-n16r8
framework = espidf
monitor_speed = 115200

board_build.arduino.memory_type = qio
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_build.flash_size = 16MB


; Automatically decodes backtraces into file names and line numbers on crash
monitor_filters = esp32_exception_decoder

; Custom partition table for the 16MB Flash
board_build.partitions = partitions.csv

; Used for embedding binary or text data (like certificates) directly into the firmware
board_build.embed_txtfiles =

build_flags = 
    -DCORE_DEBUG_LEVEL=3 ; Set log level (0: None, 1: Error, 2: Warn, 3: Info, 4: Debug, 5: Verbose)

; Libraries for UI and Data handling
lib_deps = 
    olikraus/U8g2        ; Display library (OLED/LCD)
    bblanchon/ArduinoJson ; JSON serialization/deserialization

; Tells the ESP-IDF build system (CMake) where to find hardware-specific defaults
board_build.cmake_extra_args = 
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults

; Tell PlatformIO to look in local boards/ folder
boards_dir = boards